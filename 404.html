  <title>Redirecting...</title>
  <script>
    // GitHub Pages clean URL routing
    // This handles URLs without .html extensions
    const path = window.location.pathname;
    const cleanPath = path.replace(/\/$/, ''); // Remove trailing slash
    
    // Map of clean URLs to folder-based routes
    const routes = {
      '/community': '/community/',
      '/contest': '/contest/',
      '/networking-guide': '/networking-guide/',
      '/party': '/party/',
      '/locked': '/locked/',
      '/university': '/university/',
      '/777': '/777/',
      '': '/',
      '/': '/'
    };
    
    // Check if we have a route for this path
    if (routes[cleanPath]) {
      window.location.replace(routes[cleanPath]);
    } else if (cleanPath && !cleanPath.includes('.')) {
      // Try appending .html if no extension exists
      window.location.replace(cleanPath + '/');
    } else {
      // If no route found, redirect to home
      window.location.replace('/');
    }
  </script>
